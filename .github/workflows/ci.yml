name: CI

on:
  push:
    branches:
      - main
      - master
      - refactor/flet-overhaul
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint and test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,gui]"

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Mypy gradual type check
        run: python -m mypy lanhu_mcp

      - name: Compile key entry points
        run: |
          python -m py_compile \
            lanhu_mcp_server.py \
            lanhu_mcp_gui.py \
            lanhu_login_helper.py \
            lanhu_mcp_app.py

      - name: Unit tests
        env:
          PYTHONPATH: .
        run: python -m pytest -q
